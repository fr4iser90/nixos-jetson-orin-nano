# LocalAI — use -aio-cpu on Jetson without GPU in container, or a CUDA image if you build/pull arm64+cuda.
services:
  localai:
    image: localai/localai:latest-aio-cpu
    container_name: localai
    restart: unless-stopped
    ports:
      - "8081:8080" # llama-server example uses 8080; change if unused
    volumes:
      - localai_models:/build/models
    environment:
      - THREADS=4
      - CONTEXT_SIZE=4096
    # For GPU variants see https://localai.io/basics/getting_started/ (image tags differ by arch)
volumes:
  localai_models:
