<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard — Agent Layer Control Panel</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #5b9fd4;
      --err: #e07070;
      --ok: #7bc96f;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
    }

    .card .value {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .card .label {
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Dashboard</h1>
    <p>System Übersicht & Status</p>
  </div>

  <div class="cards">
    <div class="card">
      <div class="value">-</div>
      <div class="label">Aktive Agents</div>
    </div>
    <div class="card">
      <div class="value">-</div>
      <div class="label">Laufende Workflows</div>
    </div>
    <div class="card">
      <div class="value">-</div>
      <div class="label">Registrierte Tools</div>
    </div>
    <div class="card">
      <div class="value">-</div>
      <div class="label">System Benutzer</div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script>
    // Initialisiere Layout und Auth Check
    initControlPanel("dashboard");

    // TODO: Lade echte Daten sobald API Endpunkte vorhanden sind
    async function loadDashboardData() {
      try {
        // Hier kommen später die API Aufrufe
      } catch (e) {
        console.error("Failed to load dashboard data", e);
      }
    }

    loadDashboardData();
  </script>
</body>
</html>
