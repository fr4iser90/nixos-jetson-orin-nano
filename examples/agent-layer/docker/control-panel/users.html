<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Benutzer — Agent Layer Control Panel</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #5b9fd4;
      --err: #e07070;
      --ok: #7bc96f;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      text-align: left;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    th {
      color: var(--muted);
      font-weight: 500;
      background: rgba(0,0,0,0.1);
    }

    tr:hover {
      background: rgba(91, 159, 212, 0.05);
    }

    .role-admin {
      background: rgba(123, 201, 111, 0.15);
      color: var(--ok);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
    }

    .role-user {
      background: rgba(91, 159, 212, 0.15);
      color: var(--accent);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
    }

    .toolbar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    button {
      background: var(--accent);
      color: #0a0e14;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
    }

    button.secondary {
      background: var(--border);
      color: var(--text);
    }

    button.danger {
      background: var(--err);
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Benutzer Verwaltung</h1>
    <p>System Benutzer, Rollen & API Keys</p>
  </div>

  <div class="toolbar">
    <button onclick="loadUsers()">🔄 Aktualisieren</button>
    <button class="secondary">➕ Neuen Benutzer erstellen</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Email</th>
        <th>Rolle</th>
        <th>Erstellt am</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="users-table">
      <tr>
        <td colspan="4" style="text-align: center; color: var(--muted);">Lade Benutzer...</td>
      </tr>
    </tbody>
  </table>

  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script>
    initControlPanel("users");

    async function loadUsers() {
      const tbody = document.getElementById("users-table");
      
      // TODO: Sobald Backend Route existiert hier API Call einfügen
      // const res = await apiRequest("v1/users");
      // const users = await res.json();

      // Demo Ansicht
      const user = getCurrentUser();
      tbody.innerHTML = `
        <tr>
          <td>${user.email}</td>
          <td><span class="role-admin">admin</span></td>
          <td>${new Date(user.created_at).toLocaleDateString('de-DE')}</td>
          <td>
            <button class="secondary" style="padding: 0.3rem 0.6rem; font-size: 0.75rem;">Passwort ändern</button>
            <button class="secondary" style="padding: 0.3rem 0.6rem; font-size: 0.75rem;">API Keys</button>
          </td>
        </tr>
      `;
    }

    loadUsers();
  </script>
</body>
</html>
