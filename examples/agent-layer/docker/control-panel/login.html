<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — Agent Layer Control Panel</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #5b9fd4;
      --err: #e07070;
      --ok: #7bc96f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .login-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }

    .login-box h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .login-box .subtitle {
      color: var(--muted);
      text-align: center;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      margin-bottom: 0.4rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    button {
      background: var(--accent);
      color: #0a0e14;
      border: none;
      padding: 0.75rem 1.25rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      width: 100%;
      transition: opacity 0.15s;
      margin-top: 0.5rem;
    }

    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 6px;
      font-size: 0.85rem;
      display: none;
    }

    .status.ok {
      background: rgba(123, 201, 111, 0.12);
      border: 1px solid var(--ok);
    }

    .status.err {
      background: rgba(224, 112, 0.12);
      border: 1px solid var(--err);
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h1>🔐 Agent Layer</h1>
    <p class="subtitle">Control Panel Login</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" autocomplete="email" autofocus />
    </div>

    <div class="form-group">
      <label>Passwort</label>
      <input type="password" id="password" autocomplete="current-password" />
    </div>

    <button id="login-btn">Anmelden</button>

    <div id="status" class="status"></div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Wenn bereits eingeloggt direkt zu Dashboard
    if (isLoggedIn()) {
      window.location.href = "/control/dashboard.html";
    }

    const $ = (id) => document.getElementById(id);

    function showStatus(ok, msg) {
      const statusEl = $("status");
      statusEl.style.display = "block";
      statusEl.className = ok ? "status ok" : "status err";
      statusEl.textContent = msg;
    }

    async function handleLogin() {
      const email = $("email").value.trim();
      const password = $("password").value;

      if (!email || !password) {
        showStatus(false, "Bitte Email und Passwort eingeben");
        return;
      }

      $("login-btn").disabled = true;

      const result = await login(email, password);

      $("login-btn").disabled = false;

      if (result.ok) {
        showStatus(true, "Login erfolgreich, weiterleiten...");
        setTimeout(() => {
          window.location.href = "/control/dashboard.html";
        }, 500);
      } else {
        showStatus(false, result.error);
      }
    }

    $("login-btn").onclick = handleLogin;

    $("password").addEventListener("keypress", (e) => {
      if (e.key === "Enter") handleLogin();
    });
  </script>
</body>
</html>
