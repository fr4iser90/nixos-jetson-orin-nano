<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Workflows — Agent Layer Control Panel</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #5b9fd4;
      --err: #e07070;
      --ok: #7bc96f;
      --warn: #d4a85b;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .workflow-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .workflow-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .workflow-name {
      font-weight: 600;
      font-size: 1.05rem;
    }

    .workflow-path {
      color: var(--muted);
      font-size: 0.8rem;
      font-family: ui-monospace, monospace;
    }

    .workflow-actions {
      display: flex;
      gap: 0.5rem;
    }

    button {
      background: var(--accent);
      color: #0a0e14;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.8rem;
    }

    button.secondary {
      background: var(--border);
      color: var(--text);
    }

    .status.running { color: var(--ok); }
    .status.idle { color: var(--muted); }
    .status.error { color: var(--err); }

    .toolbar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Workflow Verwaltung</h1>
    <p>Automatisierungen & geplante Tasks</p>
  </div>

  <div class="toolbar">
    <button onclick="loadWorkflows()">🔄 Aktualisieren</button>
    <button class="secondary">➕ Neuer Workflow</button>
  </div>

  <div id="workflows-list">
    <div style="text-align: center; color: var(--muted); padding: 2rem;">
      Lade Workflows...
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script>
    initControlPanel("workflows");

    async function loadWorkflows() {
      const listEl = document.getElementById("workflows-list");
      
      // TODO: Sobald Backend Route existiert hier API Call einfügen
      // const res = await apiRequest("v1/workflows");
      // const workflows = await res.json();

      // Demo Ansicht bis Backend implementiert ist
      listEl.innerHTML = `
        <div class="workflow-card">
          <div class="workflow-header">
            <div>
              <div class="workflow-name">📰 Daily RSS Summary</div>
              <div class="workflow-path">workflows/productivity/rss/daily_rss_summary.py</div>
            </div>
            <div class="workflow-actions">
              <span class="status idle">Idle</span>
              <button>▶ Ausführen</button>
              <button class="secondary">⚙️ Bearbeiten</button>
            </div>
          </div>
        </div>
      `;
    }

    loadWorkflows();
  </script>
</body>
</html>
