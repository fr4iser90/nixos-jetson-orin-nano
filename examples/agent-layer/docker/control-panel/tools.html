<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tools — Agent Layer Control Panel</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #5b9fd4;
      --err: #e07070;
      --ok: #7bc96f;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      text-align: left;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    th {
      color: var(--muted);
      font-weight: 500;
      background: rgba(0,0,0,0.1);
    }

    tr:hover {
      background: rgba(91, 159, 212, 0.05);
    }

    .toolbar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    button {
      background: var(--accent);
      color: #0a0e14;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
    }

    button.secondary {
      background: var(--border);
      color: var(--text);
    }

    .mono {
      font-family: ui-monospace, monospace;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Tool Registry</h1>
    <p>Alle registrierten MCP Tools & Funktionen</p>
  </div>

  <div class="toolbar">
    <button onclick="loadTools()">🔄 Tools neu laden</button>
    <button class="secondary" onclick="reloadRegistry()">🔄 Registry neu einlesen</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Beschreibung</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tool-table">
      <tr>
        <td colspan="3" style="text-align: center; color: var(--muted);">Lade Tools...</td>
      </tr>
    </tbody>
  </table>

  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script>
    initControlPanel("tools");

    async function loadTools() {
      try {
        const res = await apiRequest("v1/tools");
        const data = await res.json();
        const tbody = document.getElementById("tool-table");
        tbody.innerHTML = "";

        (data.tools || []).forEach(tool => {
          const fn = tool.function || {};
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td class="mono">${escapeHtml(fn.name || "-")}</td>
            <td>${escapeHtml(fn.description || fn.TOOL_DESCRIPTION || "")}</td>
            <td><button class="secondary" style="padding: 0.3rem 0.6rem; font-size: 0.75rem;">Testen</button></td>
          `;
          tbody.appendChild(tr);
        });

      } catch (e) {
        console.error(e);
      }
    }

    async function reloadRegistry() {
      await apiRequest("v1/admin/reload-tools", { method: "POST" });
      loadTools();
    }

    function escapeHtml(s) {
      return s
        .replace(/&/g, "&")
        .replace(/</g, "<")
        .replace(/>/g, ">")
        .replace(/"/g, """);
    }

    loadTools();
  </script>
</body>
</html>
