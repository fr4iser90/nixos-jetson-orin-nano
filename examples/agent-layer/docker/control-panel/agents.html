<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agents — Agent Layer Control Panel</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #5b9fd4;
      --err: #e07070;
      --ok: #7bc96f;
      --warn: #d4a85b;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .agent-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .agent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .agent-name {
      font-weight: 600;
      font-size: 1.1rem;
    }

    .agent-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .status-dot.online { background: var(--ok); }
    .status-dot.offline { background: var(--err); }
    .status-dot.busy { background: var(--warn); }

    .agent-meta {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    .agent-actions {
      display: flex;
      gap: 0.5rem;
    }

    button {
      background: var(--accent);
      color: #0a0e14;
      border: none;
      padding: 0.45rem 1rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.8rem;
    }

    button.secondary {
      background: var(--border);
      color: var(--text);
    }

    button.danger {
      background: var(--err);
    }

    .toolbar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .log-window {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem;
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Agent Verwaltung</h1>
    <p>Laufende Agent Instanzen & Status</p>
  </div>

  <div class="toolbar">
    <button onclick="loadAgents()">🔄 Aktualisieren</button>
    <button class="secondary">➕ Neuen Agent starten</button>
  </div>

  <div id="agents-list">
    <div style="text-align: center; color: var(--muted); padding: 2rem;">
      Lade Agents...
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script>
    initControlPanel("agents");

    async function loadAgents() {
      const listEl = document.getElementById("agents-list");
      
      // TODO: Sobald Backend Route existiert hier API Call einfügen
      // const res = await apiRequest("v1/agents");
      // const agents = await res.json();

      // Demo Ansicht
      listEl.innerHTML = `
        <div class="agent-card">
          <div class="agent-header">
            <div class="agent-name">🤖 Haupt Agent</div>
            <div class="agent-status">
              <span class="status-dot online"></span>
              <span>Running</span>
            </div>
          </div>
          <div class="agent-meta">
            Gestartet: Vor 2 Stunden | 127 Requests verarbeitet
          </div>
          <div class="agent-actions">
            <button class="secondary">📜 Logs anzeigen</button>
            <button class="secondary">⏹ Neustarten</button>
            <button class="danger">⏹ Stoppen</button>
          </div>
        </div>
      `;
    }

    loadAgents();
  </script>
</body>
</html>
