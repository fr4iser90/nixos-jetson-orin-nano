# Agent layer + PostgreSQL. Netzwerk ai-net (wie examples/ollama/docker/compose.yaml).
#
# Variablen: docker/.env (von .env.example kopieren). Compose lädt .env automatisch.
#
# Start:
#   docker compose up -d
#
# Open WebUI: OpenAI API URL → http://agent-layer:8080/v1 (im gleichen Docker-Netz)
#   oder vom Host: http://HOST_IP:8088/v1
#
# Modell mit Tool Calling (z. B. llama3.1, qwen2.5).
services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-layer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent}
      POSTGRES_DB: ${POSTGRES_DB:-agent}
    volumes:
      - agent_pg_data:/var/lib/postgresql/data
    networks:
      - ai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 10s
  agent-layer:
    build:
      context: .
      dockerfile: Dockerfile
    image: jetpack-agent-layer:local
    container_name: agent-layer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${AGENT_HTTP_PORT:-8088}:8080"
    env_file:
      - .env
    volumes:
      # create_tool / Default AGENT_TOOLS_EXTRA_DIR=/data/tools — ohne Mount existiert der Pfad nicht.
      - ./extra_tools:/data/tools:rw
    # Optional read-only:  - ./extra_tools:/data/tools:ro
    # Optional workspace_* : - /path/on/host/project:/workspace:rw  + AGENT_WORKSPACE_ROOT=/workspace
    networks:
      - ai-net
volumes:
  agent_pg_data:
networks:
  ai-net:
    external: true
